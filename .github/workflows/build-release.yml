name: build-release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      # The windows-latest image ships Inno Setup; install it if that ever changes.
      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          if (-not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe")) {
            choco install innosetup -y --no-progress
          }
      - name: Build installer
        run: ./build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: SplitGuard-Setup
          path: dist/SplitGuard-Setup-*.exe

  # Releases are driven by the repo-root VERSION file: bump it and push to main and
  # a tagged release is cut automatically (if that tag doesn't already exist).
  # The installer is the one and only release artifact.
  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v$(tr -d '[:space:]' < VERSION)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        if: steps.ver.outputs.exists == 'false'
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release
        if: steps.ver.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: SplitGuard ${{ steps.ver.outputs.tag }}
          files: artifacts/SplitGuard-Setup-*.exe
          generate_release_notes: true
